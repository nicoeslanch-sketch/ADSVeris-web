<!DOCTYPE html>
<html lang="es">
<head>
<title>Tienda | ADS Veris</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Catalogo de plantillas ADS Veris para estados financieros, caja, operacion, comercial, analisis y finanzas personales.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<script defer src="assets/products.js"></script>
<script defer src="assets/script.js"></script>
</head>
<body data-page="tienda">
<div data-header></div>

<main>
  <section class="section section-tight store-catalog-section">
    <div class="container">
      <div class="section-head">
        <div>
          <span class="eyebrow">Filtrar por foco</span>
          <h2>Elige por estados, caja, operacion, comercial, analisis o personas.</h2>
        </div>
        <div class="small" data-store-count>11 productos disponibles</div>
      </div>
      <div class="filters">
        <button class="filter-btn active" data-filter="all">Todos</button>
        <button class="filter-btn" data-filter="estados">Estados financieros</button>
        <button class="filter-btn" data-filter="caja">Caja y presupuesto</button>
        <button class="filter-btn" data-filter="operacion">Operacion</button>
        <button class="filter-btn" data-filter="comercial">Comercial</button>
        <button class="filter-btn" data-filter="analisis">Analisis</button>
        <button class="filter-btn" data-filter="personal">Personas</button>
      </div>
      <div class="product-grid" data-store-products></div>
    </div>
  </section>
</main>

<div data-footer></div>
</body>
</html>
